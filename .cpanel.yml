---
# Deploy cPanel — Git Version Control
#
# Modello: il repo e' clonato in una cartella di appoggio e questo script
# copia il codice aggiornato nella cartella live dell'app (DEPLOYPATH).
#
# NON tocca: .env, vendor/, storage/app, public/storage  (non sono nel repo).
#
# NB: NON esegue "composer install" (lento/instabile su hosting condiviso e
# non necessario per modifiche solo-codice). Se in futuro cambi le dipendenze
# (composer.json/lock), aggiorna vendor/ a parte una tantum.
deployment:
  tasks:
    - export DEPLOYPATH=/home2/kosmopay/public_html/kosmon

    # 1. Copia il codice aggiornato dalla checkout git alla cartella live.
    - /bin/cp -Rf app bootstrap config database public resources routes $DEPLOYPATH/
    - /bin/cp -f artisan composer.json composer.lock $DEPLOYPATH/

    # 2. Svuota le cache cancellando i file compilati (senza dipendere da php/composer).
    - /bin/rm -f $DEPLOYPATH/bootstrap/cache/config.php
    - /bin/rm -f $DEPLOYPATH/bootstrap/cache/routes-*.php
    - /bin/rm -f $DEPLOYPATH/bootstrap/cache/packages.php
    - /bin/rm -f $DEPLOYPATH/bootstrap/cache/services.php
    - /bin/rm -f $DEPLOYPATH/storage/framework/views/*.php
