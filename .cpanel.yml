---
deployment:
  tasks:
    - export COMPOSER_HOME="${HOME}/.composer"
    - mkdir -p /home2/kosmopay/kosmon/storage/logs /home2/kosmopay/kosmon/bootstrap/cache
    - echo "=== cPanel deploy started $(date) ===" > /home2/kosmopay/kosmon/storage/logs/cpanel-deploy.log
    - cd /home2/kosmopay/kosmon && /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction >> /home2/kosmopay/kosmon/storage/logs/cpanel-deploy.log 2>&1
    - cd /home2/kosmopay/kosmon && /usr/local/bin/php artisan migrate --force >> /home2/kosmopay/kosmon/storage/logs/cpanel-deploy.log 2>&1
    - cd /home2/kosmopay/kosmon && /usr/local/bin/php artisan config:cache >> /home2/kosmopay/kosmon/storage/logs/cpanel-deploy.log 2>&1
    - cd /home2/kosmopay/kosmon && /usr/local/bin/php artisan route:cache >> /home2/kosmopay/kosmon/storage/logs/cpanel-deploy.log 2>&1
    - cd /home2/kosmopay/kosmon && /usr/local/bin/php artisan view:cache >> /home2/kosmopay/kosmon/storage/logs/cpanel-deploy.log 2>&1
    - cd /home2/kosmopay/kosmon && /usr/local/bin/php artisan storage:link >> /home2/kosmopay/kosmon/storage/logs/cpanel-deploy.log 2>&1
    - rsync -a --delete /home2/kosmopay/kosmon/public/build/ /home2/kosmopay/public_html/build/ >> /home2/kosmopay/kosmon/storage/logs/cpanel-deploy.log 2>&1
    - ln -sfn /home2/kosmopay/kosmon/storage/app/public /home2/kosmopay/public_html/storage >> /home2/kosmopay/kosmon/storage/logs/cpanel-deploy.log 2>&1
    - echo "=== cPanel deploy finished $(date) ===" >> /home2/kosmopay/kosmon/storage/logs/cpanel-deploy.log
