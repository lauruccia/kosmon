[program:kmoney-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /home/forge/kmoney.it/current/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --queue=default
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=forge
numprocs=2
redirect_stderr=true
stdout_logfile=/home/forge/kmoney.it/shared/storage/logs/worker.log
stopwaitsecs=3600
startsecs=1

[program:kmoney-scheduler]
process_name=%(program_name)s
command=php /home/forge/kmoney.it/current/artisan schedule:work
autostart=true
autorestart=true
user=forge
numprocs=1
redirect_stderr=true
stdout_logfile=/home/forge/kmoney.it/shared/storage/logs/scheduler.log
