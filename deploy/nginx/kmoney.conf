# ─────────────────────────────────────────────────────────────────────────────
# Nginx — Configurazione sito KMoney (da aggiungere in Forge → Edit Nginx)
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name kmoney.it www.kmoney.it;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name kmoney.it www.kmoney.it;
    root /home/forge/kmoney.it/current/public;

    ssl_certificate     /etc/nginx/ssl/kmoney.it/certificate.crt;
    ssl_certificate_key /etc/nginx/ssl/kmoney.it/private.key;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    index index.php;
    charset utf-8;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Asset statici con cache lunga (Vite genera hash nel nome file)
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Storage pubblico (immagini shop)
    location /storage/ {
        alias /home/forge/kmoney.it/shared/storage/app/public/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }

    # Blocca accesso a file sensibili
    location ~ /\.(?!well-known).* {
        deny all;
    }
    location ~ /\.(env|git|htaccess)$ {
        deny all;
    }
}
